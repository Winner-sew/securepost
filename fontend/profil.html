<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePost - Mon Profil</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="profil.css">
    <link rel="stylesheet" href="toast.css">
</head>
<body>
<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <img src="./Images/logo.png" alt="logo">
                <div>
                    <h2>SecurePost</h2>
                    <p>Commissariat PNR</p>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <img src="./Images/logo.png" alt=""> Tableau de Bord
            </a>
            <a href="actes.html" class="nav-item">
                <img src="./Images/dossier.png" alt=""> Registre des Actes
            </a>
            <a href="formulaire.html" class="nav-item">
                <img src="./Images/crayon.png" alt=""> Nouvel Acte
            </a>
            <a href="prioritaires.html" class="nav-item">
                <img src="./Images/etoile.png" alt=""> Affaires Prioritaires
            </a>
            <a href="profil.html" class="nav-item active">
                <img src="./Images/crayon.png" alt=""> Mon Profil
            </a>
            <div id="menuCommissaire" style="display:none;">
                <div class="nav-separateur">ADMINISTRATION</div>
                <a href="agents.html" class="nav-item">
                    <img src="./Images/etoile.png" alt=""> Gestion des Agents
                </a>
                <a href="logs.html" class="nav-item">
                    <img src="./Images/dossier.png" alt=""> Logs de Traçabilité
                </a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userInitiales">?</div>
                <div>
                    <div class="user-name" id="userName">-</div>
                    <div class="user-role" id="userRole">-</div>
                </div>
            </div>
            <button class="btn-deconnexion" onclick="seDeconnecter()">
                Se déconnecter
            </button>
        </div>
    </aside>

    <main class="main-content">

        <div class="page-header">
            <h1>Mon Profil</h1>
            <p>Vos informations personnelles et professionnelles</p>
        </div>

        <div class="profil-carte">
            <div class="profil-entete">
                <div class="profil-avatar" id="profilAvatar">?</div>
                <div>
                    <div class="profil-nom" id="profilNom">Chargement...</div>
                    <div class="profil-matricule" id="profilMatricule">-</div>
                </div>
            </div>

            <div class="profil-infos">
                <div class="profil-info-item">
                    <span>Rôle</span>
                    <span id="profilRole">-</span>
                </div>
                <div class="profil-info-item">
                    <span>Brigade</span>
                    <span id="profilBrigade">-</span>
                </div>
                <div class="profil-info-item">
                    <span>Membre depuis</span>
                    <span id="profilDate">-</span>
                </div>
            </div>

            <div class="form-group">
                <label>Adresse Email</label>
                <input type="email" id="profilEmail" placeholder="email@securepost.cg"/>
            </div>

            <div class="form-group">
                <label>Nouveau mot de passe (laisser vide pour ne pas changer)</label>
                <input type="password" id="profilMotDePasse" placeholder="••••••••"/>
            </div>

            <button class="btn-modifier-profil" onclick="enregistrerProfil()">
                Enregistrer les modifications
            </button>
        </div>

    </main>
</div>

<script src="toast.js"></script>
<script src="profil.js"></script>
</body>
</html>
