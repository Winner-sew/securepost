<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePost - Gestion des Agents</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="agents.css">
</head>
<body>
<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <img src="./Images/logo.png" alt="logo">
                <div>
                    <h2>SecurePost</h2>
                    <p>Commissariat PNR</p>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <img src="./Images/logo.png" alt=""> Tableau de Bord
            </a>
            <a href="actes.html" class="nav-item">
                <img src="./Images/dossier.png" alt=""> Registre des Actes
            </a>
            <a href="formulaire.html" class="nav-item">
                <img src="./Images/crayon.png" alt=""> Nouvel Acte
            </a>
            <a href="prioritaires.html" class="nav-item">
                <img src="./Images/etoile.png" alt=""> Affaires Prioritaires
            </a>
            <div class="nav-separateur">ADMINISTRATION</div>
            <a href="agents.html" class="nav-item active">
                <img src="./Images/etoile.png" alt=""> Gestion des Agents
            </a>
            <a href="logs.html" class="nav-item">
                <img src="./Images/dossier.png" alt=""> Logs de Traçabilité
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userInitiales">?</div>
                <div>
                    <div class="user-name" id="userName">-</div>
                    <div class="user-role" id="userRole">-</div>
                </div>
            </div>
            <button class="btn-deconnexion" onclick="seDeconnecter()">
                Se déconnecter
            </button>
        </div>
    </aside>

    <main class="main-content">

        <div class="page-header">
            <h1>Gestion des Agents</h1>
            <p>Administration du personnel — Accès Commissaire uniquement</p>
        </div>

        <div class="alert alert-error" id="alertErreur"></div>
        <div class="alert alert-success" id="alertSucces"></div>

        <!-- Formulaire ajout agent -->
        <div class="formulaire-agent">
            <h3 class="formulaire-agent-titre">Ajouter un nouvel agent</h3>
            <div class="formulaire-agent-grille">
                <div class="form-group">
                    <label>Nom *</label>
                    <input type="text" id="agentNom" placeholder="Nom de famille"/>
                </div>
                <div class="form-group">
                    <label>Prénom *</label>
                    <input type="text" id="agentPrenom" placeholder="Prénom"/>
                </div>
                <div class="form-group">
                    <label>Matricule *</label>
                    <input type="text" id="agentMatricule" placeholder="AGT-007"/>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="agentEmail" placeholder="agent@securepost.cg"/>
                </div>
                <div class="form-group">
                    <label>Mot de passe *</label>
                    <input type="password" id="agentMotDePasse" placeholder="••••••••"/>
                </div>
                <div class="form-group">
                    <label>Rôle *</label>
                    <select id="agentRole">
                        <option value="agent">Agent</option>
                        <option value="officier">Officier</option>
                        <option value="commissaire">Commissaire</option>
                    </select>
                </div>
            </div>
            <button class="btn-ajouter-agent" onclick="ajouterAgent()">
                Ajouter l'agent
            </button>
        </div>

        <!-- Liste des agents -->
        <div class="agents-grille" id="listeAgents">
            <p>Chargement...</p>
        </div>

    </main>
</div>

<script src="agents.js"></script>
</body>
</html>
